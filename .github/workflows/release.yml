---
name: release
on:  # yamllint disable-line rule:truthy
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        # yamllint disable-line rule:line-length
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install Rust toolchain
        # yamllint disable-line rule:line-length
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Install build tooling
        # yamllint disable-line rule:line-length
        uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5  # v2.82.0
        with:
          tool: cross,cargo-deb,just
      - name: Build binaries and Debian packages
        run: just deb
      - name: Generate release notes
        id: git-cliff
        # yamllint disable-line rule:line-length
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5  # v4.8.0
        with:
          args: --current
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          NOTES_FILE: ${{ steps.git-cliff.outputs.changelog }}
        run: |-
          gh release create "$TAG" --title "$TAG" --notes-file "$NOTES_FILE"
      - name: Upload artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" dist/*
