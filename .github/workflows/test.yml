---
name: test
on:  # yamllint disable-line rule:truthy
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # yamllint disable-line rule:line-length
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # ratchet:actions/checkout@v6.0.3
        with:
          persist-credentials: false
      # yamllint disable-line rule:line-length
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # ratchet:dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      # yamllint disable-line rule:line-length
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # ratchet:Swatinem/rust-cache@v2.9.1
      # yamllint disable-line rule:line-length
      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5  # ratchet:taiki-e/install-action@v2.82.0
        with:
          tool: cargo-llvm-cov
      - name: Run tests with coverage
        run: |
          mkdir -p pr
          cargo llvm-cov --json \
            | jq '.data[0].totals.lines.percent' > pr/percent.txt
          cat pr/percent.txt
      - name: Record PR number
        env:
          PR_NUMBER: ${{ github.event.number }}
        run: echo "$PR_NUMBER" > pr/NR
      # yamllint disable-line rule:line-length
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # ratchet:actions/upload-artifact@v4.6.2
        with:
          name: pr
          path: pr/
