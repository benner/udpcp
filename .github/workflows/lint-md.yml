---
name: lint-md
on:  # yamllint disable-line rule:truthy
  pull_request:
    branches: [main]
    paths: ['**.md', .markdownlint.yaml, .github/workflows/lint-md.yml]
permissions:
  contents: read
jobs:
  markdownlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        # yamllint disable-line rule:line-length
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # ratchet:actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - name: Lint Markdown with markdownlint
        # yamllint disable-line rule:line-length
        uses: reviewdog/action-markdownlint@3667398db9118d7e78f7a63d10e26ce454ba5f58  # ratchet:reviewdog/action-markdownlint@v0.26.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: info
          fail_level: any
  rumdl:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        # yamllint disable-line rule:line-length
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # ratchet:actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - name: Set up uv
        # yamllint disable-line rule:line-length
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # ratchet:astral-sh/setup-uv@v7.6.0
      - name: Set up reviewdog
        # yamllint disable-line rule:line-length
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f  # ratchet:reviewdog/action-setup@v1.5.0
      - name: Lint Markdown with rumdl
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |-
          uvx rumdl check . --output-format json-lines > rumdl.jsonl || true
          jq -c '
            {
              source: {name: "rumdl"},
              severity: (.severity | ascii_upcase),
              message: .message,
              location: {
                path: .file,
                range: {start: {line: .line, column: .column}}
              },
              code: {value: .rule}
            }
          ' rumdl.jsonl \
            | reviewdog \
                -f=rdjsonl \
                -name=rumdl \
                -reporter=github-pr-review \
                -filter-mode=added \
                -fail-level=any
